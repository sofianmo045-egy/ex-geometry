<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Excavator Geometry Pro</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --accent-blue: #38bdf8;
            --success-green: #059669;
            --text-gray: #94a3b8;
            --pds-orange: #f59e0b;
            --error-red: #ef4444;
            --sub-text-gray: #64748b;
        }

        body { 
            background-color: #f1f5f9; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            padding: 20px 10px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            box-sizing: border-box;
        }

        .card { 
            max-width: 550px; 
            width: 100%; 
            background: #fff; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        .header { background: var(--primary-bg); color: white; padding: 25px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: 0.5px; }
        .header p { margin: 5px 0 0; font-size: 14px; color: var(--sub-text-gray); font-weight: 500; }
        .header a { color: var(--accent-blue); text-decoration: none; font-weight: bold; }

        .tabs { display: flex; background: #1e293b; border-bottom: 2px solid #334155; }
        .tab-btn { 
            flex: 1; padding: 15px 5px; text-align: center; color: var(--text-gray); 
            background: none; border: none; font-weight: bold; cursor: pointer; 
            transition: 0.3s; font-size: 12px; text-transform: uppercase;
        }
        .tab-btn.active { color: #fff; border-bottom: 3px solid var(--accent-blue); background: var(--primary-bg); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .diagram-container { width: 100%; background: #0f172a; padding: 20px 0; text-align: center; }
        canvas { max-width: 100%; height: auto; }
        
        .main-container { padding: 20px; }
        .group { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; }
        .group-title { font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        .input-row { display: flex; gap: 12px; }
        .input-col { flex: 1; }
        .input-col label { font-size: 10px; color: #64748b; font-weight: 600; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .input-col input { 
            width: 100%; padding: 10px; border: 1.5px solid #e2e8f0; 
            border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; text-align: center;
        }

        .calc-btn { 
            width: calc(100% - 40px); margin: 10px 20px 20px 20px; padding: 16px; 
            background: var(--success-green); color: white; border: none; 
            border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; 
        }

        .results-area { background: var(--primary-bg); color: #f8fafc; padding: 25px 20px; display: none; }
        .res-line { display: flex; justify-content: space-between; margin: 10px 0; font-size: 14px; border-bottom: 1px solid #1e293b; padding-bottom: 5px; }
        .res-line b { color: #fff; }

        .id-badge { background: #e2e8f0; color: #1e293b; padding: 2px 5px; border-radius: 4px; font-size: 9px; margin-right: 5px; }
    </style>
</head>
<body onload="autoLoad()">

<div class="card">
    <div class="header">
        <h1>Excavator Geometry Pro</h1>
        <p>Interactive Calibration Assistant</p>
        <div style="font-size: 11px; margin-top: 10px; color: var(--text-gray);">Created by Mohamed Shehata</div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" id="btn-measurements" onclick="openTab(event, 'tab-measurements')">Geometry</button>
        <button class="tab-btn" id="btn-calibration" onclick="openTab(event, 'tab-calibration')">Crane Config</button>
        <button class="tab-btn" id="btn-diagram" onclick="openTab(event, 'tab-diagram')">Live Diagram</button>
    </div>

    <div id="tab-measurements" class="tab-content active">
        <div class="group">
            <span class="group-title">Antenna 1 & 2 Survey</span>
            <div class="input-row">
                <div class="input-col"><label>X1</label><input type="number" step="0.001" id="X1" class="saveable" oninput="autoSave()"></div>
                <div class="input-col"><label>Y1</label><input type="number" step="0.001" id="Y1" class="saveable" oninput="autoSave()"></div>
                <div class="input-col"><label>Z1</label><input type="number" step="0.001" id="Z1" class="saveable" oninput="autoSave()"></div>
            </div>
            <div class="input-row" style="margin-top:10px">
                <div class="input-col"><label>X2</label><input type="number" step="0.001" id="X2" class="saveable" oninput="autoSave()"></div>
                <div class="input-col"><label>Y2</label><input type="number" step="0.001" id="Y2" class="saveable" oninput="autoSave()"></div>
                <div class="input-col"><label>Z2</label><input type="number" step="0.001" id="Z2" class="saveable" oninput="autoSave()"></div>
            </div>
        </div>
        <button class="calc-btn" onclick="calcMeasurements()">Calculate Geometry</button>
        <div id="resultsMeasurements" class="results-area">
            <div class="res-line"><span>Antenna Heading:</span> <b id="out-antH">N/A</b></div>
        </div>
    </div>

    <div id="tab-calibration" class="tab-content">
        <div class="main-container">
            <div class="input-block"><span class="group-title">Boom Pin</span><div class="input-row"><div class="input-col"><label>X</label><input type="number" id="x_bp" class="saveable" step="0.001"></div><div class="input-col"><label>Y</label><input type="number" id="y_bp" class="saveable" step="0.001"></div><div class="input-col"><label>Z</label><input type="number" id="z_bp" class="saveable" step="0.001"></div></div></div>
            <div class="input-block"><span class="group-title">Stick Pin</span><div class="input-row"><div class="input-col"><label>X</label><input type="number" id="x_st" class="saveable" step="0.001"></div><div class="input-col"><label>Y</label><input type="number" id="y_st" class="saveable" step="0.001"></div><div class="input-col"><label>Z</label><input type="number" id="z_st" class="saveable" step="0.001"></div></div></div>
            <div class="input-block"><span class="group-title">Bucket Pin</span><div class="input-row"><div class="input-col"><label>X</label><input type="number" id="x_bu" class="saveable" step="0.001"></div><div class="input-col"><label>Y</label><input type="number" id="y_bu" class="saveable" step="0.001"></div><div class="input-col"><label>Z</label><input type="number" id="z_bu" class="saveable" step="0.001"></div></div></div>
            <div class="input-block"><span class="group-title">Teeth (T1)</span><div class="input-row"><div class="input-col"><label>X</label><input type="number" id="x_t1" class="saveable" step="0.001"></div><div class="input-col"><label>Y</label><input type="number" id="y_t1" class="saveable" step="0.001"></div><div class="input-col"><label>Z</label><input type="number" id="z_t1" class="saveable" step="0.001"></div></div></div>
        </div>
        <button class="calc-btn" onclick="calcCalibration()">Calculate & Draw</button>
        <div id="resultsCalibration" class="results-area">
            <div class="res-line"><span>Boom Length:</span> <b id="out-boomL_cal">N/A</b></div>
            <div class="res-line"><span>Stick Length:</span> <b id="out-stickL_cal">N/A</b></div>
            <div class="res-line"><span>Bucket (T1):</span> <b id="out-t1">N/A</b></div>
        </div>
    </div>

    <div id="tab-diagram" class="tab-content">
        <div class="diagram-container">
            <canvas id="excavatorCanvas" width="500" height="400"></canvas>
            <div style="color: var(--accent-blue); font-size: 12px; margin-top: 10px;">Side View - Visual Representation</div>
        </div>
    </div>
</div>

<script>
    const getV = (id) => { const el = document.getElementById(id); return el && el.value !== "" ? parseFloat(el.value) : null; };
    const format = (val, unit = "") => (val === null || isNaN(val)) ? "N/A" : val.toFixed(3) + unit;
    function dist3D(p1, p2) { if (!p1 || !p2) return null; return Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2) + Math.pow(p2.z - p1.z, 2)); }
    function getP(id_p) { const x = getV('x_'+id_p), y = getV('y_'+id_p), z = getV('z_'+id_p); if (x === null || y === null || z === null) return null; return { x, y, z }; }

    function openTab(evt, tabName) {
        let i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) { tabcontent[i].style.display = "none"; tabcontent[i].classList.remove("active"); }
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
        document.getElementById(tabName).style.display = "block";
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
        if (tabName === 'tab-diagram') setTimeout(drawExcavator, 50);
    }

    // --- Drawing Engine ---
    function drawExcavator() {
        const canvas = document.getElementById('excavatorCanvas');
        const ctx = canvas.getContext('2d');
        
        // Fetch values from results (Clean numbers)
        const boomL = (parseFloat(document.getElementById('out-boomL_cal').innerText) || 5) * 40;
        const stickL = (parseFloat(document.getElementById('out-stickL_cal').innerText) || 3) * 40;
        const bucketL = (parseFloat(document.getElementById('out-t1').innerText) || 1.5) * 40;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Scale and Base position
        let startX = 80, startY = 320;

        // Draw Boom (Yellow)
        let bEnd = { x: startX + boomL * 0.7, y: startY - boomL * 0.6 };
        ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 10; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(startX, startY); ctx.lineTo(bEnd.x, bEnd.y); ctx.stroke();

        // Draw Stick (Blue)
        let sEnd = { x: bEnd.x + stickL * 0.3, y: bEnd.y + stickL * 0.9 };
        ctx.strokeStyle = '#38bdf8';
        ctx.beginPath(); ctx.moveTo(bEnd.x, bEnd.y); ctx.lineTo(sEnd.x, sEnd.y); ctx.stroke();

        // Draw Bucket (Green)
        let buckEnd = { x: sEnd.x + bucketL * 0.8, y: sEnd.y + bucketL * 0.3 };
        ctx.strokeStyle = '#059669';
        ctx.beginPath(); ctx.moveTo(sEnd.x, sEnd.y); ctx.lineTo(buckEnd.x, buckEnd.y); ctx.stroke();

        // Points
        ctx.fillStyle = "#fff";
        [ {x:startX, y:startY}, bEnd, sEnd ].forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
        });
    }

    function calcCalibration() {
        const BP = getP('bp'), ST = getP('st'), BU = getP('bu'), T1 = getP('t1');
        const res = {
            'out-boomL_cal': format(dist3D(BP, ST)),
            'out-stickL_cal': format(dist3D(ST, BU)),
            'out-t1': format(dist3D(T1, BU))
        };
        for (let id in res) document.getElementById(id).innerText = res[id];
        document.getElementById('resultsCalibration').style.display = "block";
        autoSave();
        drawExcavator();
    }

    function calcMeasurements() {
        const X1 = getV('X1'), Y1 = getV('Y1'), X2 = getV('X2'), Y2 = getV('Y2');
        if (X1 !== null && X2 !== null) {
            const h = (Math.atan2(X2 - X1, Y2 - Y1) * 180 / Math.PI + 360) % 360;
            document.getElementById('out-antH').innerText = h.toFixed(3) + "°";
            document.getElementById('resultsMeasurements').style.display = "block";
        }
    }

    function autoSave() {
        const inputs = {};
        document.querySelectorAll('.saveable').forEach(el => inputs[el.id] = el.value);
        localStorage.setItem('ex_data', JSON.stringify(inputs));
    }

    function autoLoad() {
        const saved = JSON.parse(localStorage.getItem('ex_data'));
        if (saved) for (let id in saved) if(document.getElementById(id)) document.getElementById(id).value = saved[id];
    }
</script>

</body>
</html>
