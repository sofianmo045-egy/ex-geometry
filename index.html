<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Excavator Calculator</title>
    <style>
        body { background-color: #f0f2f5; font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { max-width: 500px; width: 100%; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { margin: 0; font-size: 24px; color: #333; }
        
        .group-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .point-id { font-size: 11px; font-weight: bold; color: #007bff; background: #e7f3ff; padding: 2px 6px; border-radius: 4px; }

        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 10px; cursor: pointer; border: none; background: none; font-size: 16px; font-weight: bold; color: #555; }
        .tab-btn.active { color: #007bff; border-bottom: 3px solid #007bff; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .group { margin-bottom: 15px; padding: 10px; border: 1px solid #eee; border-radius: 10px; }
        .group-title { font-size: 14px; font-weight: bold; color: #555; margin-bottom: 10px; display: block; }
        .input-row { display: flex; gap: 10px; }
        .input-col { flex: 1; }
        .input-col label { font-size: 12px; color: #777; display: block; }
        .input-col input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-align: center; box-sizing: border-box; }

        .import-container { margin-bottom: 15px; text-align: center; }
        .import-btn { background: #007bff; color: #fff; padding: 10px; border-radius: 5px; cursor: pointer; display: inline-block; font-weight: bold; }
        #csvFileInput { display: none; }

        .calc-btn { width: 100%; padding: 15px; background: #28a745; color: #fff; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .results { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; display: none; }
        .res-line { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>Excavator Calculator</h1>
        <p style="font-size: 12px; color: #777;">Developed by Mohamed Shehata</p>
    </div>

    <div class="import-container">
        <label for="csvFileInput" class="import-btn">📥 Import CSV</label>
        <input type="file" id="csvFileInput" accept=".csv">
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tab1')">Geometry</button>
        <button class="tab-btn" onclick="openTab(event, 'tab2')">Calibration</button>
    </div>

    <div id="tab1" class="tab-content active">
        <div class="group">
            <div class="group-header"><span class="group-title">Antenna 1 (Master)</span><span class="point-id">ID: X1</span></div>
            <div class="input-row">
                <div class="input-col"><label>X</label><input type="number" step="0.001" id="X1"></div>
                <div class="input-col"><label>Y</label><input type="number" step="0.001" id="Y1"></div>
                <div class="input-col"><label>Z</label><input type="number" step="0.001" id="Z1"></div>
            </div>
        </div>
        <div class="group">
            <div class="group-header"><span class="group-title">Antenna 2 (Slave)</span><span class="point-id">ID: X2</span></div>
            <div class="input-row">
                <div class="input-col"><label>X</label><input type="number" step="0.001" id="X2"></div>
                <div class="input-col"><label>Y</label><input type="number" step="0.001" id="Y2"></div>
                <div class="input-col"><label>Z</label><input type="number" step="0.001" id="Z2"></div>
            </div>
        </div>
        <div class="group">
            <div class="group-header"><span class="group-title">Boom Pin Starboard</span><span class="point-id">ID: XS</span></div>
            <div class="input-row">
                <div class="input-col"><label>X</label><input type="number" step="0.001" id="Xs"></div>
                <div class="input-col"><label>Y</label><input type="number" step="0.001" id="Ys"></div>
                <div class="input-col"><label>Z</label><input type="number" step="0.001" id="Zs"></div>
            </div>
        </div>
        <div class="group">
            <div class="group-header"><span class="group-title">Boom Pin Portside</span><span class="point-id">ID: XP</span></div>
            <div class="input-row">
                <div class="input-col"><label>X</label><input type="number" step="0.001" id="Xp"></div>
                <div class="input-col"><label>Y</label><input type="number" step="0.001" id="Yp"></div>
                <div class="input-col"><label>Z</label><input type="number" step="0.001" id="Zp"></div>
            </div>
        </div>
        <div class="group">
            <div class="group-header"><span class="group-title">Bucket Center</span><span class="point-id">ID: BU</span></div>
            <div class="input-row">
                <div class="input-col"><label>X</label><input type="number" step="0.001" id="Xb"></div>
                <div class="input-col"><label>Y</label><input type="number" step="0.001" id="Yb"></div>
                <div class="input-col"><label>Z</label><input type="number" step="0.001" id="Zb"></div>
            </div>
        </div>
        <button class="calc-btn" onclick="calculateGeometry()">Calculate Geometry</button>
        <div id="res1" class="results"></div>
    </div>

    <div id="tab2" class="tab-content">
        <div class="group">
            <div class="group-header"><span class="group-title">Main Boom Pin</span><span class="point-id">ID: BP</span></div>
            <div class="input-row">
                <div class="input-col"><label>X</label><input type="number" step="0.001" id="x_bp"></div>
                <div class="input-col"><label>Y</label><input type="number" step="0.001" id="y_bp"></div>
                <div class="input-col"><label>Z</label><input type="number" step="0.001" id="z_bp"></div>
            </div>
        </div>
        <div class="group">
            <div class="group-header"><span class="group-title">Stick Pin</span><span class="point-id">ID: ST</span></div>
            <div class="input-row">
                <div class="input-col"><label>X</label><input type="number" step="0.001" id="x_st"></div>
                <div class="input-col"><label>Y</label><input type="number" step="0.001" id="y_st"></div>
                <div class="input-col"><label>Z</label><input type="number" step="0.001" id="z_st"></div>
            </div>
        </div>
        <div class="group">
            <div class="group-header"><span class="group-title">Bucket Pin (T5)</span><span class="point-id">ID: PKT</span></div>
            <div class="input-row">
                <div class="input-col"><label>X</label><input type="number" step="0.001" id="x_bu"></div>
                <div class="input-col"><label>Y</label><input type="number" step="0.001" id="y_bu"></div>
                <div class="input-col"><label>Z</label><input type="number" step="0.001" id="z_bu"></div>
            </div>
        </div>
        <button class="calc-btn" onclick="calculateCalibration()">Calculate Calibration</button>
        <div id="res2" class="results"></div>
    </div>
</div>

<script>
    function openTab(evt, tabId) {
        let i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) tabcontent[i].classList.remove("active");
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
        document.getElementById(tabId).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    document.getElementById('csvFileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const lines = event.target.result.split(/\r?\n/);
            const mapping = {
                'X1': ['X1', 'Y1', 'Z1'],
                'X2': ['X2', 'Y2', 'Z2'],
                'XS': ['Xs', 'Ys', 'Zs'],
                'XP': ['Xp', 'Yp', 'Zp'],
                'BU': ['Xb', 'Yb', 'Zb'],
                'BP': ['x_bp', 'y_bp', 'z_bp'],
                'ST': ['x_st', 'y_st', 'z_st'],
                'PKT': ['x_bu', 'y_bu', 'z_bu']
            };
            lines.forEach(line => {
                const parts = line.split(',');
                if (parts.length >= 4) {
                    const name = parts[0].trim().toUpperCase();
                    if (mapping[name]) {
                        document.getElementById(mapping[name][0]).value = parts[1].trim();
                        document.getElementById(mapping[name][1]).value = parts[2].trim();
                        document.getElementById(mapping[name][2]).value = parts[3].trim();
                    }
                }
            });
            alert('Imported Successfully');
        };
        reader.readAsText(file);
    });

    function calculateGeometry() {
        const p1 = {x: parseFloat(document.getElementById('X1').value), y: parseFloat(document.getElementById('Y1').value), z: parseFloat(document.getElementById('Z1').value)};
        const p2 = {x: parseFloat(document.getElementById('X2').value), y: parseFloat(document.getElementById('Y2').value), z: parseFloat(document.getElementById('Z2').value)};
        const ps = {x: parseFloat(document.getElementById('Xs').value), y: parseFloat(document.getElementById('Ys').value), z: parseFloat(document.getElementById('Zs').value)};
        const pp = {x: parseFloat(document.getElementById('Xp').value), y: parseFloat(document.getElementById('Yp').value), z: parseFloat(document.getElementById('Zp').value)};
        const pb = {x: parseFloat(document.getElementById('Xb').value), y: parseFloat(document.getElementById('Yb').value), z: parseFloat(document.getElementById('Zb').value)};

        const antDistH = Math.sqrt(Math.pow(p2.x - p1.x, 2) + Math.pow(p2.y - p1.y, 2));
        const antHeading = (Math.atan2(p2.x - p1.x, p2.y - p1.y) * 180 / Math.PI + 360) % 360;
        const pc = { x: (ps.x + pp.x) / 2, y: (ps.y + pp.y) / 2, z: (ps.z + pp.z) / 2 };
        const machHeading = (Math.atan2(pb.x - pc.x, pb.y - pc.y) * 180 / Math.PI + 360) % 360;
        const headingCorr = machHeading - antHeading;

        const rad = -machHeading * Math.PI / 180;
        const off1 = {
            f: (p1.y - pc.y) * Math.cos(rad) - (p1.x - pc.x) * Math.sin(rad),
            s: (p1.x - pc.x) * Math.cos(rad) + (p1.y - pc.y) * Math.sin(rad),
            u: p1.z - pc.z
        };

        const res = document.getElementById('res1');
        res.style.display = 'block';
        res.innerHTML = `
            <div class="res-line"><span>Antenna H-Dist:</span><b>${antDistH.toFixed(3)}</b></div>
            <div class="res-line"><span>Machine Heading:</span><b>${machHeading.toFixed(2)}°</b></div>
            <div class="res-line"><span>Heading Corr:</span><b>${headingCorr.toFixed(2)}°</b></div>
            <div class="res-line"><span>Forward (Y):</span><b>${off1.f.toFixed(3)}</b></div>
            <div class="res-line"><span>Starboard (X):</span><b>${off1.s.toFixed(3)}</b></div>
            <div class="res-line"><span>Up (Z):</span><b>${off1.u.toFixed(3)}</b></div>
        `;
    }

    function calculateCalibration() {
        const getP = (id) => ({
            x: parseFloat(document.getElementById('x_'+id).value),
            y: parseFloat(document.getElementById('y_'+id).value),
            z: parseFloat(document.getElementById('z_'+id).value)
        });
        const bp = getP('bp'), st = getP('st'), bu = getP('bu');
        const dist3D = (a, b) => Math.sqrt(Math.pow(a.x-b.x,2)+Math.pow(a.y-b.y,2)+Math.pow(a.z-b.z,2));
        
        const res = document.getElementById('res2');
        res.style.display = 'block';
        res.innerHTML = `
            <div class="res-line"><span>Boom Length:</span><b>${dist3D(bp, st).toFixed(3)}</b></div>
            <div class="res-line"><span>Stick Length:</span><b>${dist3D(st, bu).toFixed(3)}</b></div>
        `;
    }
</script>

</body>
</html>
