<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excavator 3D Calculator - A4 Report</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #f1c40f; }
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; }
        
        .main-layout { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1200px; margin: auto; }
        .controls { flex: 1; min-width: 300px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* حاوية العرض الـ 3D */
        #canvas-container { 
            flex: 1; min-width: 350px; height: 400px; 
            background: #333; border-radius: 10px; overflow: hidden; position: relative;
        }

        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        label { font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }

        button { width: 100%; padding: 12px; margin-top: 10px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-calc { background: var(--primary); color: white; }
        .btn-print { background: #27ae60; color: white; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background: #eee; }

        /* تنسيقات الطباعة A4 */
        @media print {
            @page { size: A4; margin: 10mm; }
            .no-print, #canvas-container { display: none !important; }
            body { padding: 0; background: white; }
            .controls { box-shadow: none; width: 100%; max-width: none; }
        }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="controls">
        <h2>حاسبة الحفار الذكية</h2>
        <div class="input-group no-print">
            <div>
                <label>East (GPS):</label>
                <input type="number" id="gpsE" value="100.000" step="0.001">
            </div>
            <div>
                <label>North (GPS):</label>
                <input type="number" id="gpsN" value="200.000" step="0.001">
            </div>
            <div>
                <label>Height (Z):</label>
                <input type="number" id="gpsZ" value="10.000" step="0.001">
            </div>
            <div>
                <label>Angle (S1):</label>
                <input type="number" id="angleS1" value="45" oninput="update3D()">
            </div>
            <div>
                <label>Angle (S2):</label>
                <input type="number" id="angleS2" value="30" oninput="update3D()">
            </div>
        </div>

        <button class="btn-calc no-print" onclick="calculate()">تحديث الحسابات</button>
        <button class="btn-print no-print" onclick="window.print()">طباعة تقرير A4</button>

        <div id="reportSection">
            <h3>نتائج النقاط (Report)</h3>
            <table>
                <thead>
                    <tr>
                        <th>النقطة</th>
                        <th>East</th>
                        <th>North</th>
                        <th>Level</th>
                    </tr>
                </thead>
                <tbody id="resultsBody">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="canvas-container">
        <div style="position:absolute; color:white; padding:10px; font-size:12px;">معاينة ثلاثية الأبعاد (Live 3D)</div>
    </div>
</div>

<script>
    // --- إعدادات المشهد الـ 3D ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, container.clientWidth / container.clientHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setClearColor(0x2c3e50);
    container.appendChild(renderer.domElement);

    // الإضاءة
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 5, 5).normalize();
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // إنشاء أجزاء الحفار (بسيطة للفحص)
    const material = new THREE.MeshLambertMaterial({ color: 0xf1c40f });
    
    // الجسم الرئيسي
    const base = new THREE.Mesh(new THREE.BoxGeometry(2, 0.8, 3), material);
    scene.add(base);

    // الذراع الأول (Boom)
    const boom = new THREE.Mesh(new THREE.BoxGeometry(0.4, 3, 0.4), material);
    boom.geometry.translate(0, 1.5, 0); // جعل نقطة الدوران في طرف الذراع
    boom.position.y = 0.4;
    base.add(boom);

    // الذراع الثاني (Arm)
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.3, 2.5, 0.3), material);
    arm.geometry.translate(0, 1.25, 0);
    arm.position.y = 3;
    boom.add(arm);

    camera.position.set(5, 5, 8);
    camera.lookAt(0, 0, 0);

    // دالة تحديث الحركة الـ 3D بناءً على الزوايا
    function update3D() {
        const s1 = parseFloat(document.getElementById('angleS1').value) || 0;
        const s2 = parseFloat(document.getElementById('angleS2').value) || 0;

        // تحويل الزوايا لراديان وتطبيقها على المفاصل
        boom.rotation.x = THREE.MathUtils.degToRad(s1 - 90);
        arm.rotation.x = THREE.MathUtils.degToRad(s2);
        
        renderer.render(scene, camera);
    }

    // دالة الحسابات (نفس منطقك الأصلي)
    function calculate() {
        const E = parseFloat(document.getElementById('gpsE').value);
        const N = parseFloat(document.getElementById('gpsN').value);
        const Z = parseFloat(document.getElementById('gpsZ').value);
        
        // مثال لمعادلة الحساب (Bucket Pin)
        const bucketE = E + 2.5; // استبدلها بمعادلاتك الدقيقة
        const bucketN = N + 1.2;
        const bucketZ = Z - 3.4;

        document.getElementById('resultsBody').innerHTML = `
            <tr><td>GPS Point</td><td>${E.toFixed(3)}</td><td>${N.toFixed(3)}</td><td>${Z.toFixed(3)}</td></tr>
            <tr><td><strong>Bucket Pin</strong></td><td><strong>${bucketE.toFixed(3)}</strong></td><td><strong>${bucketN.toFixed(3)}</strong></td><td><strong>${bucketZ.toFixed(3)}</strong></td></tr>
        `;
        update3D();
    }

    // تشغيل الأنيميشن والحسابات الأولية
    function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
    }
    
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    animate();
    calculate();
</script>

</body>
</html>
