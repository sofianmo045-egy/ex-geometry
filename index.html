<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Excavator Tools">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <title>Excavator Surveying Tools</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --accent-blue: #38bdf8;
            --success-green: #059669;
            --text-gray: #94a3b8;
            --pds-orange: #f59e0b;
        }
        body { background-color: #f1f5f9; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 20px 10px; font-family: 'Segoe UI', sans-serif; margin: 0; box-sizing: border-box; }
        .card { max-width: 550px; width: 100%; background: #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .header { background: var(--primary-bg); color: white; padding: 25px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 20px; }
        .tabs { display: flex; background: #1e293b; }
        .tab-btn { flex: 1; padding: 12px 5px; text-align: center; color: var(--text-gray); background: none; border: none; font-weight: bold; cursor: pointer; font-size: 11px; }
        .tab-btn.active { color: #fff; border-bottom: 3px solid var(--accent-blue); background: var(--primary-bg); }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-col { flex: 1; }
        .input-col label { font-size: 10px; color: #64748b; display: block; margin-bottom: 2px; }
        .input-col input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; text-align: center; }
        .calc-btn { width: 100%; padding: 15px; background: var(--success-green); color: white; border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .results-area { background: var(--primary-bg); color: white; padding: 20px; margin-top: 20px; border-radius: 10px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>Excavator Tools</h1>
        <p style="color: var(--accent-blue); font-size: 12px; margin: 5px 0 0;">Surveying & Calibration</p>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tab1')">Measurements</button>
        <button class="tab-btn" onclick="openTab(event, 'tab2')">Calibration</button>
    </div>

    <div id="tab1" class="tab-content active">
        <div class="input-row">
            <div class="input-col"><label>X1</label><input type="number" id="X1" step="0.001"></div>
            <div class="input-col"><label>Y1</label><input type="number" id="Y1" step="0.001"></div>
            <div class="input-col"><label>Z1</label><input type="number" id="Z1" step="0.001"></div>
        </div>
        <button class="calc-btn" onclick="calcM()">Calculate</button>
        <div id="res1" class="results-area"></div>
    </div>

    <div id="tab2" class="tab-content">
        <button class="calc-btn" onclick="calcC()">Calculate Calibration</button>
        <div id="res2" class="results-area"></div>
    </div>
</div>

<script>
    function openTab(evt, name) {
        var i, content, links;
        content = document.getElementsByClassName("tab-content");
        for (i = 0; i < content.length; i++) content[i].classList.remove("active");
        links = document.getElementsByClassName("tab-btn");
        for (i = 0; i < links.length; i++) links[i].classList.remove("active");
        document.getElementById(name).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    // هنا حط الـ Functions الأصلية بتاعتك (calcM و calcC) زي ما هي
    function calcM() { /* الكود بتاعك */ document.getElementById('res1').style.display='block'; }
    function calcC() { /* الكود بتاعك */ document.getElementById('res2').style.display='block'; }
</script>

</body>
</html>
