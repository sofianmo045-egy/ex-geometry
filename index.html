<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excavator Calculator - A4 Report</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1, h2 {
            text-align: center;
            color: var(--primary-color);
        }

        .input-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .input-field {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        .btn-container {
            text-align: center;
            margin: 20px 0;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            transition: 0.3s;
        }

        .btn-calc { background-color: var(--accent-color); color: white; }
        .btn-print { background-color: #27ae60; color: white; margin-right: 10px; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* تنسيق الجدول */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th { background-color: #ecf0f1; color: var(--primary-color); }

        /* --- إعدادات الطباعة A4 --- */
        @media print {
            @page {
                size: A4;
                margin: 15mm;
            }

            body { background: white; padding: 0; }
            
            .container {
                width: 100%;
                max-width: none;
                box-shadow: none;
                padding: 0;
            }

            .no-print, .input-group, .btn-container {
                display: none !important;
            }

            h1 { font-size: 24pt; margin-bottom: 20px; }
            
            table { font-size: 12pt; }
            
            th { background-color: #eee !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>حاسبة إحداثيات الحفار</h1>
    
    <div class="input-group no-print">
        <div class="input-field">
            <label>إحداثي GPS (East):</label>
            <input type="number" id="gpsE" step="0.001" placeholder="0.000">
        </div>
        <div class="input-field">
            <label>إحداثي GPS (North):</label>
            <input type="number" id="gpsN" step="0.001" placeholder="0.000">
        </div>
        <div class="input-field">
            <label>منسوب GPS (Z):</label>
            <input type="number" id="gpsZ" step="0.001" placeholder="0.000">
        </div>
        <div class="input-field">
            <label>المسافة المائلة (S2):</label>
            <input type="number" id="distS2" step="0.001" placeholder="Slope Distance">
        </div>
        <div class="input-field">
            <label>الزاوية (Heading):</label>
            <input type="number" id="heading" step="0.01" placeholder="0.00°">
        </div>
    </div>

    <div class="btn-container no-print">
        <button class="btn-calc" onclick="calculate()">حساب النتائج</button>
        <button class="btn-print" onclick="window.print()">طباعة تقرير A4</button>
    </div>

    <div id="reportSection">
        <h2>نتائج التقرير الفني</h2>
        <table>
            <thead>
                <tr>
                    <th>النقطة</th>
                    <th>East (X)</th>
                    <th>North (Y)</th>
                    <th>Level (Z)</th>
                </tr>
            </thead>
            <tbody id="resultsBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    function calculate() {
        // جلب القيم من المدخلات
        const E = parseFloat(document.getElementById('gpsE').value) || 0;
        const N = parseFloat(document.getElementById('gpsN').value) || 0;
        const Z = parseFloat(document.getElementById('gpsZ').value) || 0;
        const S2 = parseFloat(document.getElementById('distS2').value) || 0;
        const angle = (parseFloat(document.getElementById('heading').value) || 0) * (Math.PI / 180);

        // منطق الحساب (تم الحفاظ على دمج T5/Bucket Pin كما طلبت سابقاً)
        // ملاحظة: هذه معادلات تجريبية بناءً على سياق مشروعك
        const targetE = E + (S2 * Math.sin(angle));
        const targetN = N + (S2 * Math.cos(angle));
        const targetZ = Z - 1.5; // مثال على فرق المنسوب

        const tbody = document.getElementById('resultsBody');
        tbody.innerHTML = `
            <tr>
                <td>نقطة الـ GPS</td>
                <td>${E.toFixed(3)}</td>
                <td>${N.toFixed(3)}</td>
                <td>${Z.toFixed(3)}</td>
            </tr>
            <tr>
                <td><strong>Bucket Pin (T5)</strong></td>
                <td><strong>${targetE.toFixed(3)}</strong></td>
                <td><strong>${targetN.toFixed(3)}</strong></td>
                <td><strong>${targetZ.toFixed(3)}</strong></td>
            </tr>
        `;
    }
</script>

</body>
</html>
