<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Excavator Geometry</title>
    <style>
        :root {
            --primary-bg: #0f172a;
            --accent-blue: #38bdf8;
            --success-green: #059669;
            --text-gray: #94a3b8;
            --pds-orange: #f59e0b;
            --error-red: #ef4444;
            --sub-text-gray: #64748b;
        }

        body { 
            background-color: #f1f5f9; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start;
            padding: 20px 10px; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            box-sizing: border-box;
        }

        .card { 
            max-width: 550px; 
            width: 100%; 
            background: #fff; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }

        .header { background: var(--primary-bg); color: white; padding: 25px 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 22px; letter-spacing: 0.5px; }
        .header p { margin: 5px 0 0; font-size: 14px; color: var(--sub-text-gray); font-weight: 500; }
        .header a { color: var(--accent-blue); text-decoration: none; font-weight: bold; }
        .created-by { margin-top: 10px; font-size: 12px; color: #94a3b8; }

        .tabs { display: flex; background: #1e293b; border-bottom: 2px solid #334155; }
        .tab-btn { 
            flex: 1; padding: 15px 5px; text-align: center; color: var(--text-gray); 
            background: none; border: none; font-weight: bold; cursor: pointer; 
            transition: 0.3s; font-size: 12px; text-transform: uppercase;
        }
        .tab-btn.active { color: #fff; border-bottom: 3px solid var(--accent-blue); background: var(--primary-bg); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .diagram-container { width: 100%; background: #fff; padding: 20px 0; text-align: center; }
        .diagram-container img { max-width: 90%; height: auto; border-radius: 12px; margin-bottom: 20px; border: 1px solid #ddd; }
        
        .main-container { padding: 20px; }
        .group { padding: 15px 20px; border-bottom: 1px solid #f1f5f9; }
        .group-title { font-size: 11px; font-weight: 800; color: #475569; text-transform: uppercase; margin-bottom: 10px; display: block; }
        
        .input-row { display: flex; gap: 12px; }
        .input-col { flex: 1; }
        .input-col label { font-size: 10px; color: #64748b; font-weight: 600; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .input-col input { 
            width: 100%; padding: 10px; border: 1.5px solid #e2e8f0; 
            border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; text-align: center;
        }

        .calc-btn { 
            width: calc(100% - 40px); margin: 10px 20px 20px 20px; padding: 16px; 
            background: var(--success-green); color: white; border: none; 
            border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; 
        }

        .results-area { background: var(--primary-bg); color: #f8fafc; padding: 25px 20px; display: none; }
        .res-line { display: flex; justify-content: space-between; margin: 10px 0; font-size: 14px; border-bottom: 1px solid #1e293b; padding-bottom: 5px; }
        .res-line b { color: #fff; }
        
        .action-btns-container { display: flex; gap: 8px; margin: 0 20px 20px; }
        .clear-btn, .history-bottom-btn, .reset-btn { 
            flex: 1; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 11px; text-transform: uppercase; border: none;
        }
        .clear-btn { background: #fee2e2; color: #ef4444; border: 1px solid #ef4444; }
        .history-bottom-btn { background: #1e293b; color: var(--accent-blue); border: 1px solid var(--accent-blue); }
        .reset-btn { background: #334155; color: white; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 15% auto; padding: 20px; width: 85%; max-width: 400px; border-radius: 15px; }
        
        .footer { padding: 25px; font-size: 11px; color: #64748b; text-align: center; background: #fafafa; }
        .id-badge { background: #e2e8f0; color: #1e293b; padding: 2px 5px; border-radius: 4px; font-size: 9px; margin-right: 5px; }
    </style>
</head>
<body onload="autoLoad()">

<div class="card">
    <div class="header">
        <h1>Excavator Geometry</h1>
        <p>Calculator and Calibration Assistant</p>
        <div class="created-by">Created by: <a href="#">Mohamed Shehata</a></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'tab-measurements')">Geometry</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-calibration')">Crane Config</button>
        <button class="tab-btn" onclick="openTab(event, 'tab-diagram')">Diagram</button>
    </div>

    <div id="tab-measurements" class="tab-content active">
        <div class="group">
            <span class="group-title"><span class="id-badge">A1</span> ANTENNA 1</span>
            <div class="input-row">
                <div class="input-col"><label>X1</label><input type="number" step="0.001" id="X1" class="saveable" oninput="autoSave()"></div>
                <div class="input-col"><label>Y1</label><input type="number" step="0.001" id="Y1" class="saveable" oninput="autoSave()"></div>
                <div class="input-col"><label>Z1</label><input type="number" step="0.001" id="Z1" class="saveable" oninput="autoSave()"></div>
            </div>
        </div>
        <button class="calc-btn" onclick="calcMeasurements()">Calculate Measurements</button>
        <div id="resultsMeasurements" class="results-area">
            <div class="res-line"><span>Machine Heading:</span> <b id="out-mH">N/A</b></div>
        </div>
    </div>

    <div id="tab-calibration" class="tab-content">
        <div class="main-container">
            <div class="group">
                <span class="group-title">Stick Pin</span>
                <div class="input-row">
                    <div class="input-col"><label>X</label><input type="number" id="x_st" class="saveable" step="0.001" oninput="autoSave()"></div>
                    <div class="input-col"><label>Y</label><input type="number" id="y_st" class="saveable" step="0.001" oninput="autoSave()"></div>
                    <div class="input-col"><label>Z</label><input type="number" id="z_st" class="saveable" step="0.001" oninput="autoSave()"></div>
                </div>
            </div>
        </div>
        <button class="calc-btn" onclick="calcCalibration()">Calculate Calibration</button>
    </div>

    <div id="tab-diagram" class="tab-content">
        <div class="diagram-container">
            <p style="font-size: 12px; color: #666;">Excavator Reference Diagram</p>
            <img src="https://via.placeholder.com/400x300?text=Excavator+Diagram" alt="Diagram 1">
            <img src="https://via.placeholder.com/400x200?text=CSV+Guide" alt="Diagram 2">
            <img src="https://via.placeholder.com/400x300?text=Stick+Dimensions" alt="Diagram 3">
        </div>
    </div>

    <div class="action-btns-container">
        <button class="clear-btn" onclick="clearPageOnly()">Clear</button>
        <button class="reset-btn" onclick="resetHistoryOnly()">Reset All</button>
    </div>

    <div class="footer">
        <strong>Survey Tools v2.0</strong>
    </div>
</div>

<script>
    const getV = (id) => { const el = document.getElementById(id); return el && el.value !== "" ? parseFloat(el.value) : null; };
    const format = (val, unit = "") => (val === null || isNaN(val)) ? "N/A" : val.toFixed(3) + unit;

    function openTab(evt, tabName) {
        let i, tabcontent, tablinks;
        tabcontent = document.getElementsByClassName("tab-content");
        for (i = 0; i < tabcontent.length; i++) tabcontent[i].style.display = "none";
        tablinks = document.getElementsByClassName("tab-btn");
        for (i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
        document.getElementById(tabName).style.display = "block";
        evt.currentTarget.classList.add("active");
    }

    function autoSave() {
        const inputs = {};
        document.querySelectorAll('.saveable').forEach(el => { inputs[el.id] = el.value; });
        localStorage.setItem('excavator_inputs', JSON.stringify(inputs));
    }

    function autoLoad() {
        const saved = JSON.parse(localStorage.getItem('excavator_inputs'));
        if (saved) {
            for (let id in saved) {
                const el = document.getElementById(id);
                if (el) el.value = saved[id];
            }
        }
    }

    function calcMeasurements() {
        // ضع معادلاتك هنا
        document.getElementById('resultsMeasurements').style.display = "block";
    }

    function clearPageOnly() {
        document.querySelectorAll('input').forEach(i => i.value = "");
        localStorage.removeItem('excavator_inputs');
    }

    function resetHistoryOnly() {
        if(confirm("Are you sure?")) {
            localStorage.clear();
            location.reload();
        }
    }
</script>

</body>
</html>
